<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Boy Voice Studio</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #000000; /* Black Background */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #111111;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #ffcc00; /* Neon Yellow Border */
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        h2 { color: #ffcc00; margin-bottom: 20px; text-transform: uppercase; text-shadow: 0 0 8px #ffcc00; }
        
        .api-box {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .api-box input {
            width: 70%;
            margin-bottom: 0;
        }
        .api-box button {
            width: 25%;
            padding: 10px;
            background-color: #28a745;
            font-size: 14px;
        }
        .api-box button:hover { background-color: #218838; box-shadow: 0 0 10px #28a745; }

        input, textarea, select {
            width: 95%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 6px;
            font-size: 16px;
            margin-bottom: 15px;
            background-color: #222;
            color: #fff;
            box-sizing: border-box;
        }
        textarea { height: 100px; resize: none; }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #ff0000;
        }
        .main-btn {
            background-color: #ff0000; /* Red Button */
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .main-btn:hover { background-color: #cc0000; box-shadow: 0 0 15px red; }
        audio { width: 100%; margin-top: 20px; display: none; }
        
        #downloadBtn {
            display: none;
            background-color: #ffcc00;
            color: #000;
            text-decoration: none;
            padding: 12px;
            margin-top: 15px;
            border-radius: 6px;
            font-weight: bold;
            width: 90%;
            margin-left: auto;
            margin-right: auto;
        }
        #downloadBtn:hover { background-color: #e6b800; }
        #status { margin-top: 10px; font-size: 14px; color: #00ff00; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔥 Pro Boy Voice AI</h2>
    
    <div class="api-box">
        <input type="password" id="apiKey" placeholder="ElevenLabs API Key paste karein...">
        <button onclick="saveApiKey()">Save Key</button>
    </div>
    
    <select id="voiceId">
        <option value="ErXwobaYiN019PkySvjV">Antoni (18 Year Boy - Best for Hindi)</option>
        <option value="pNInz6obpgDQGcFmaJgB">Adam (Deep Male Voice)</option>
    </select>
    
    <textarea id="text" placeholder="Yahan apna script type karein..."></textarea>
    
    <button class="main-btn" onclick="generateVoice()">Generate Voice</button>
    <div id="status"></div>

    <audio id="audioPlayer" controls></audio>
    <a id="downloadBtn" href="#" download="boy_voice_ai.mp3">⬇️ DOWNLOAD MP3</a>
</div>

<script>
    // PAGE LOAD HOTE HI SAVE KI HUI KEY CHECK KAREGA
    window.onload = function() {
        let savedKey = localStorage.getItem("myElevenLabsKey");
        if (savedKey) {
            document.getElementById("apiKey").value = savedKey;
        }
    };

    // API KEY SAVE KARNE KA FUNCTION
    function saveApiKey() {
        let key = document.getElementById("apiKey").value.trim();
        if (key === "") {
            alert("Bhai, pehle API Key dalo toh sahi!");
            return;
        }
        localStorage.setItem("myElevenLabsKey", key);
        alert("✅ API Key hamesha ke liye aapke phone mein save ho gayi!");
    }

    // AUDIO GENERATE KARNE KA FUNCTION
    async function generateVoice() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const text = document.getElementById('text').value.trim();
        const voiceId = document.getElementById('voiceId').value;
        const statusText = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        const downloadBtn = document.getElementById('downloadBtn');

        if(!apiKey || !text) {
            alert("Bhai, API Key aur Text dono zaroori hain!");
            return;
        }

        statusText.style.color = "#ffcc00";
        statusText.innerText = "⏳ Aawaz ban rahi hai, kripya thoda wait karein...";
        audioPlayer.style.display = "none";
        downloadBtn.style.display = "none";

        try {
            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
                method: 'POST',
                headers: {
                    'accept': 'audio/mpeg',
                    'xi-api-key': apiKey,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    text: text,
                    model_id: "eleven_multilingual_v2" 
                })
            });

            if (!response.ok) {
                throw new Error("❌ Error! API Key galat hai ya limit khatam ho gayi hai.");
            }

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            
            audioPlayer.src = url;
            audioPlayer.style.display = "block";
            
            downloadBtn.href = url;
            downloadBtn.style.display = "block";
            
            statusText.style.color = "#00ff00";
            statusText.innerText = "✅ Aawaz ready hai! Download button dabayein.";
            
        } catch (error) {
            statusText.style.color = "#ff0000";
            statusText.innerText = error.message;
        }
    }
</script>

</body>
</html>
