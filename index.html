<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free AI Voice Studio</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #111; padding: 25px; border-radius: 12px; border: 2px solid #ff0000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); width: 90%; max-width: 500px; text-align: center; }
        h2 { color: #ff0000; margin-bottom: 20px; text-shadow: 0 0 8px #ff0000; }
        
        .api-box { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .api-box input { width: 70%; margin-bottom: 0; }
        .api-box button { width: 25%; padding: 10px; background-color: #28a745; border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .api-box button:hover { background-color: #218838; }

        input, textarea { width: 95%; padding: 12px; border: 1px solid #333; border-radius: 6px; font-size: 16px; margin-bottom: 15px; background-color: #222; color: #fff; box-sizing: border-box; }
        textarea { height: 100px; resize: none; }
        input:focus, textarea:focus { outline: none; border-color: #ffcc00; }
        
        .main-btn { background-color: #ffcc00; color: #000; border: none; padding: 14px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; }
        .main-btn:hover { background-color: #e6b800; }
        
        audio { width: 100%; margin-top: 20px; display: none; }
        #downloadBtn { display: none; background-color: #ff0000; color: #fff; text-decoration: none; padding: 12px; margin-top: 15px; border-radius: 6px; font-weight: bold; width: 90%; margin-left: auto; margin-right: auto; }
        #status { margin-top: 10px; font-size: 14px; color: #00ff00; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔥 FREE HUGGINGFACE VOICE</h2>
    
    <div class="api-box">
        <input type="password" id="apiKey" placeholder="Apni hf_... wali Key paste karein">
        <button onclick="saveApiKey()">Save Key</button>
    </div>
    
    <textarea id="text" placeholder="Yahan Hindi script likhein (Jaise: हेलो दोस्तों)..."></textarea>
    
    <button class="main-btn" onclick="generateVoice()">Generate Voice</button>
    <div id="status"></div>

    <audio id="audioPlayer" controls></audio>
    <a id="downloadBtn" href="#" download="huggingface_voice.mp3">⬇️ DOWNLOAD MP3</a>
</div>

<script>
    window.onload = function() {
        let savedKey = localStorage.getItem("myHFKey");
        if (savedKey) { document.getElementById("apiKey").value = savedKey; }
    };

    function saveApiKey() {
        let key = document.getElementById("apiKey").value.trim();
        if (key === "") { alert("Bhai, pehle API Key dalo!"); return; }
        localStorage.setItem("myHFKey", key);
        alert("✅ Hugging Face API Key save ho gayi!");
    }

    async function generateVoice() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const text = document.getElementById('text').value.trim();
        const statusText = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        const downloadBtn = document.getElementById('downloadBtn');

        if(!apiKey || !text) { alert("Key aur Text dono zaruri hain!"); return; }

        statusText.style.color = "#ffcc00";
        statusText.innerText = "⏳ Audio generate ho raha hai, wait karein...";
        audioPlayer.style.display = "none";
        downloadBtn.style.display = "none";

        try {
            const response = await fetch(
                "https://api-inference.huggingface.co/models/facebook/mms-tts-hin",
                {
                    headers: { Authorization: `Bearer ${apiKey}` },
                    method: "POST",
                    body: JSON.stringify({ inputs: text }),
                }
            );

            if (!response.ok) { throw new Error("❌ Error! API Key galat hai ya server busy hai."); }

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            
            audioPlayer.src = url;
            audioPlayer.style.display = "block";
            downloadBtn.href = url;
            downloadBtn.style.display = "block";
            
            statusText.style.color = "#00ff00";
            statusText.innerText = "✅ Aawaz taiyar hai! Download karein.";
            
        } catch (error) {
            statusText.style.color = "#ff0000";
            statusText.innerText = error.message;
        }
    }
</script>

</body>
</html>
