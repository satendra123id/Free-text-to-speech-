        }

            font-weight: bold;

            width: 100%; 
            text-transform: uppercase; 
            transition: 0.3s; 
        }
        .generate-btn:hover { 
            background-color: #cc0000; 
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.7); 
        }

            font-size: 15px; 
            font-weight: bold;
