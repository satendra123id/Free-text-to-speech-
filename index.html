<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Boy Voice Studio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #000; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background-color: #111; padding: 30px; border-radius: 12px; border: 2px solid #ffcc00; box-shadow: 0 0 25px rgba(255, 204, 0, 0.4); width: 100%; max-width: 500px; text-align: center; }
        h2 { color: #ff0000; margin-bottom: 25px; text-transform: uppercase; text-shadow: 0 0 10px rgba(255, 0, 0, 0.8); letter-spacing: 1px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #ffcc00; font-weight: bold; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 6px; background-color: #222; color: #fff; font-size: 16px; box-sizing: border-box; }
        input:focus, textarea:focus, select:focus { border-color: #ff0000; outline: none; box-shadow: 0 0 8px rgba(255, 0, 0, 0.5); }
        .save-btn { background-color: #28a745; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; margin-top: 10px; width: 100%; font-weight: bold; text-transform: uppercase; }
        .save-btn:hover { background-color: #218838; }
        .generate-btn { background-color: #ff0000; color: white; border: none; padding: 16px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; transition: 0.3s; }
        .generate-btn:hover { background-color: #cc0000; box-shadow: 0 0 15px rgba(255, 0, 0, 0.7); }
        #status { margin-top: 15px; font-size: 15px; font-weight: bold; min-height: 22px; }
        audio { width: 100%; margin-top: 20px; display: none; }
        #downloadBtn { display: none; background-color: #ffcc00; color: #000; text-decoration: none; padding: 14px; margin-top: 15px; border-radius: 8px; font-weight: bold; text-align: center; font-size: 16px; }
        #downloadBtn:hover { background-color: #e6b800; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔥 Pro Boy Voice AI</h2>
    
    <div class="input-group">
        <label>ElevenLabs API Key:</label>
        <input type="password" id="apiKey" placeholder="Apni copy ki hui API Key yahan paste karein...">
        <button class="save-btn" onclick="saveKey()">Save Key Hamesha Ke Liye</button>
    </div>

    <div class="input-group">
        <label>Aawaz Select Karein:</label>
        <select id="voiceId">
            <option value="ErXwobaYiN019PkySvjV">👦 Antoni (18 Year Boy - Best For Hindi)</option>
            <option value="pNInz6obpgDQGcFmaJgB">👨 Adam (Deep Male Voice)</option>
        </select>
    </div>

    <div class="input-group">
        <label>Apna Script Likhein (Hindi/English):</label>
        <textarea id="textInput" placeholder="Bhai, yahan apna text type karo..."></textarea>
    </div>

    <button class="generate-btn" id="genBtn" onclick="generateVoice()">Generate Audio</button>

    <div id="status"></div>
    <audio id="audioPlayer" controls></audio>
    <a id="downloadBtn" href="#" download="Pro_Boy_Voice.mp3">⬇️ DOWNLOAD MP3 DIRECT</a>
</div>

<script>
    window.onload = function() {
        const savedKey = localStorage.getItem("myElevenKeyPro");
        if (savedKey) { document.getElementById("apiKey").value = savedKey; }
    };

    function saveKey() {
        const key = document.getElementById("apiKey").value.trim();
        if (key === "") { alert("Bhai, pehle API Key box mein dalo!"); return; }
        
        // HF key pakadne ke liye check
        if (key.startsWith("hf_")) {
            alert("❌ Galti! Aapne Hugging Face wali (hf_...) key daal di hai. Kripya ElevenLabs ki key dalein.");
            return;
        }

        localStorage.setItem("myElevenKeyPro", key);
        alert("✅ Mubarak ho! Key save ho gayi hai.");
    }

    async function generateVoice() {
        const apiKey = document.getElementById("apiKey").value.trim();
        const text = document.getElementById("textInput").value.trim();
        const voiceId = document.getElementById("voiceId").value;
        const btn = document.getElementById("genBtn");
        const statusDiv = document.getElementById("status");
        const audioPlayer = document.getElementById("audioPlayer");
        const downloadBtn = document.getElementById("downloadBtn");

        if (!apiKey || !text) { 
            alert("Bhai, API Key aur apna Text dono dalo!"); 
            return; 
        }

        if (apiKey.startsWith("hf_")) {
            statusDiv.innerText = "❌ Error: Yeh Hugging Face ki key hai. ElevenLabs ki key daalein.";
            statusDiv.style.color = "#ff0000";
            return;
        }

        statusDiv.innerText = "⏳ Aawaz ban rahi hai, bas kuch seconds wait karo...";
        statusDiv.style.color = "#ffcc00";
        btn.disabled = true;
        btn.innerText = "Processing...";
        audioPlayer.style.display = "none";
        downloadBtn.style.display = "none";

        try {
            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
                method: 'POST',
                headers: {
                    'accept': 'audio/mpeg',
                    'xi-api-key': apiKey,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    text: text,
                    model_id: "eleven_multilingual_v2" 
                })
            });

            if (!response.ok) {
                // Yahan hum asli error nikal rahe hain ElevenLabs ke server se
                let realErrorMsg = "API Key galat hai ya koi issue hai.";
                try {
                    const errData = await response.json();
                    if (errData.detail && errData.detail.message) {
                        realErrorMsg = errData.detail.message;
                    }
                } catch(e) {}
                
                throw new Error("❌ Asli Error: " + realErrorMsg);
            }

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            
            audioPlayer.src = url;
            audioPlayer.style.display = "block";
            downloadBtn.href = url;
            downloadBtn.style.display = "block";
            
            statusDiv.innerText = "✅ Aawaz ekdum ready hai! Niche se download kar lo.";
            statusDiv.style.color = "#00ff00"; 

        } catch (error) {
            statusDiv.innerText = error.message;
            statusDiv.style.color = "#ff0000"; 
        } finally {
            btn.disabled = false;
            btn.innerText = "Generate Audio";
        }
    }
</script>

</body>
</html>
