<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Studio - Free & Pro</title>
    <style>
        /* DESIGN: Black, Red, Yellow High-Contrast */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #111111;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #ffcc00; /* Neon Yellow */
            box-shadow: 0 0 25px rgba(255, 204, 0, 0.4);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h2 { 
            color: #ff0000; /* High-Contrast Red */
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.7);
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #ffcc00;
            font-weight: bold;
            font-size: 14px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 8px;
            background-color: #222;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus, textarea:focus {
            border-color: #ff0000;
            outline: none;
        }
        .save-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            font-weight: bold;
        }
        .generate-btn {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .generate-btn:hover {
            background-color: #cc0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
        }
        #status {
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
        }
        audio {
            width: 100%;
            margin-top: 20px;
            display: none;
        }
        #downloadBtn {
            display: none;
            background-color: #ffcc00;
            color: #000;
            text-decoration: none;
            padding: 12px;
            margin-top: 15px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
        }
        .footer-note {
            font-size: 12px;
            color: #777;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🔥 AI Voice Studio</h2>
    
    <div class="input-group">
        <label>API Key (Auto-Saved):</label>
        <input type="password" id="apiKey" placeholder="Yahan apni API Key paste karein...">
        <button class="save-btn" onclick="saveKey()">SAVE KEY FOR PERMANENT</button>
    </div>

    <div class="input-group">
        <label>Apna Text Likhein:</label>
        <textarea id="textInput" placeholder="Namaste doston, kaise hain aap sab?"></textarea>
    </div>

    <button class="generate-btn" id="genBtn" onclick="generateVoice()">Generate & Download</button>

    <div id="status"></div>

    <audio id="audioPlayer" controls></audio>
    <a id="downloadBtn" href="#" download="ai_voice_thenewtips.mp3">⬇️ DOWNLOAD MP3</a>

    <p class="footer-note">Note: Pehli baar mein error aaye toh 20 sec rukh kar firse try karein.</p>
</div>

<script>
    // 1. PAGE LOAD PAR KEY CHECK KARNA
    window.onload = function() {
        const savedKey = localStorage.getItem("userApiKey");
        if (savedKey) {
            document.getElementById("apiKey").value = savedKey;
            showStatus("✅ Saved key loaded automatically.", "#00ff00");
        }
    };

    // 2. KEY SAVE KARNE KA FUNCTION
    function saveKey() {
        const key = document.getElementById("apiKey").value.trim();
        if (key === "") {
            alert("Bhai, pehle key toh dalo!");
            return;
        }
        localStorage.setItem("userApiKey", key);
        alert("Success! Ab aapko baar-baar key nahi dalni padegi.");
    }

    // 3. VOICE GENERATE KARNE KA MAIN FUNCTION
    async function generateVoice() {
        const apiKey = document.getElementById("apiKey").value.trim();
        const text = document.getElementById("textInput").value.trim();
        const statusDiv = document.getElementById("status");
        const audioPlayer = document.getElementById("audioPlayer");
        const downloadBtn = document.getElementById("downloadBtn");
        const btn = document.getElementById("genBtn");

        if (!apiKey || !text) {
            alert("Bhai, Key aur Text dono bharo!");
            return;
        }

        // Reset UI
        showStatus("⏳ Connecting to AI Server...", "#ffcc00");
        btn.disabled = true;
        btn.innerText = "Processing...";
        audioPlayer.style.display = "none";
        downloadBtn.style.display = "none";

        try {
            const response = await fetch(
                "https://api-inference.huggingface.co/models/facebook/mms-tts-hin",
                {
                    headers: { 
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json" 
                    },
                    method: "POST",
                    body: JSON.stringify({ inputs: text }),
                }
            );

            // Handle Server Wake-up (503 Error)
            if (response.status === 503) {
                const data = await response.json();
                const wait = data.estimated_time || 20;
                showStatus(`⏳ Server so raha hai. Waking up in ${Math.round(wait)}s... Firse try karein.`, "#ffcc00");
            } 
            else if (!response.ok) {
                throw new Error("❌ API Key galat hai ya server busy hai.");
            } 
            else {
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                
                audioPlayer.src = url;
                audioPlayer.style.display = "block";
                
                downloadBtn.href = url;
                downloadBtn.style.display = "block";
                
                showStatus("✅ Voice Taiyar Hai! Niche se download karein.", "#00ff00");
            }
        } catch (error) {
            showStatus(error.message, "#ff0000");
        } finally {
            btn.disabled = false;
            btn.innerText = "Generate & Download";
        }
    }

    function showStatus(msg, color) {
        const statusDiv = document.getElementById("status");
        statusDiv.innerText = msg;
        statusDiv.style.color = color;
    }
</script>

</body>
</html>
