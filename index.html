<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Male Voice Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }
        .container {
            background-color: #34495e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h2 { margin-bottom: 20px; color: #ecf0f1; }
        textarea {
            width: 90%;
            height: 120px;
            padding: 10px;
            border: 1px solid #7f8c8d;
            border-radius: 8px;
            font-size: 16px;
            resize: none;
            margin-bottom: 15px;
            background-color: #ecf0f1;
            color: #2c3e50;
        }
        select {
            width: 95%;
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            margin-bottom: 20px;
        }
        button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        button:hover { background-color: #c0392b; }
        .note { font-size: 13px; color: #bdc3c7; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Male Voice Generator 🎙️</h2>
    
    <textarea id="text" placeholder="Yahan apna text type karein..."></textarea>
    
    <select id="voiceSelect">
        <option value="">Aawaz load ho rahi hai...</option>
    </select>
    
    <button onclick="speakText()">Play Voice ▶</button>

    <p class="note">Note: Best Male Voice ke liye is website ko <b>Microsoft Edge</b> browser mein open karein aur list mein se <b>'Hemant'</b> ya koi Male voice select karein.</p>
</div>

<script>
    let synth = window.speechSynthesis;
    let voiceSelect = document.getElementById('voiceSelect');
    let voices = [];

    function populateVoiceList() {
        voices = synth.getVoices();
        voiceSelect.innerHTML = '';
        
        voices.forEach((voice, i) => {
            // Hindi aur English aawazein filter kar rahe hain
            if(voice.lang.includes('hi') || voice.lang.includes('en')) {
                let option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.value = i;
                voiceSelect.appendChild(option);
            }
        });
    }

    populateVoiceList();
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = populateVoiceList;
    }

    function speakText() {
        let textInput = document.getElementById('text').value;
        if (textInput !== '') {
            let utterThis = new SpeechSynthesisUtterance(textInput);
            let selectedOption = voiceSelect.selectedOptions[0].value;
            utterThis.voice = voices[selectedOption];
            
            // Aawaz ko thoda bhari aur natural banane ke liye pitch set kar rahe hain
            utterThis.pitch = 0.9; 
            utterThis.rate = 0.95; 
            
            synth.speak(utterThis);
        } else {
            alert("Bhai, kuch text toh likho!");
        }
    }
</script>

</body>
</html>
